# Build and create release ZIP on main merge (for Keio server deployment)
name: Build Release

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build for Keio (with SPA fallbacks)
        run: npm run build:keio

      - name: Create ZIP artifact
        run: |
          cd dist
          zip -r ../keio-release.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: keio-release-${{ github.sha }}
          path: keio-release.zip
          retention-days: 90
